algorithm:
  match_score: 1.0
  mismatch_score: -0.7
  open_gap_score: -0.5
  extend_gap_score: -3.0
  min_score: 20.0
  max_iterations: 100
  dedupe_overlaps: true
  dedupe_prefer: length
  # Drop if span ratio exceeds this on original coords, dense (alignment) coords, or both (default).
  max_span_ratio: 2.0
  max_span_ratio_basis: both  # original | dense | both

seeding:
  k: 15
  max_gap: 14
  extend: 450
  max_region_length: 6000
  max_kmer_hits: 7

preprocessing:
  strip_chars: "\\_"

input:
  dir: "data"

output:
  path: "output/Gpb023_vs_ex_2.csv"
